# ── Secret template ──────────────────────────────────────────────────────────
# Replace every placeholder value before applying to the cluster.
# NEVER commit real keys to source control.
# Apply with:  kubectl apply -f secrets.yaml -n fte-production
apiVersion: v1
kind: Secret
metadata:
  name: fte-secrets
  namespace: fte-production
type: Opaque
stringData:
  # ── Database ──────────────────────────────────────────────────────────────
  DATABASE_PASSWORD: "CHANGE_ME"

  # ── LLM providers (at least one required) ────────────────────────────────
  OPENAI_API_KEY:  "sk-CHANGE_ME"
  GROQ_API_KEY:    ""          # optional — Groq fallback
  GEMINI_API_KEY:  ""          # optional — Gemini fallback

  # ── Twilio / WhatsApp ─────────────────────────────────────────────────────
  TWILIO_ACCOUNT_SID:    "ACCHANGE_ME"
  TWILIO_AUTH_TOKEN:     "CHANGE_ME"
  TWILIO_WHATSAPP_FROM:  "whatsapp:+14155238886"

  # ── Gmail / Google Cloud ──────────────────────────────────────────────────
  GOOGLE_APPLICATION_CREDENTIALS_JSON: "{}"   # full service-account JSON

  # ── SMTP (web-form email replies) ─────────────────────────────────────────
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USER: "CHANGE_ME@gmail.com"
  SMTP_PASS: "CHANGE_ME"
