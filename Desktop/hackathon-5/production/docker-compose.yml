services:

  # ── PostgreSQL + pgvector ───────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB:       fte_db
      POSTGRES_USER:     fte_user
      POSTGRES_PASSWORD: fte_password
    ports:
      - "5433:5432"          # host 5433 → container 5432 (avoids conflict with local PG)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U fte_user -d fte_db"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Zookeeper (required by Kafka) ───────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    healthcheck:
      test:     ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Kafka ───────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
    healthcheck:
      test:     ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:9092 --list"]
      interval: 15s
      timeout:  10s
      retries:  5

  # ── FastAPI — customer-facing API ───────────────────────────────────────────
  fte-api:
    build: .
    command: uvicorn production.api.main:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL:             postgresql://fte_user:fte_password@postgres:5432/fte_db
      KAFKA_BOOTSTRAP_SERVERS:  kafka:9092
      LOG_FORMAT:               json
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:     ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  3

  # ── Kafka worker — agent + delivery ─────────────────────────────────────────
  fte-worker:
    build: .
    command: python -m production.workers.message_processor
    env_file:
      - .env
    environment:
      DATABASE_URL:             postgresql://fte_user:fte_password@postgres:5432/fte_db
      KAFKA_BOOTSTRAP_SERVERS:  kafka:9092
      LOG_FORMAT:               json
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── Metrics collector — runs every 5 min ────────────────────────────────────
  metrics-collector:
    build: .
    command: python -m production.workers.metrics_collector
    env_file:
      - .env
    environment:
      DATABASE_URL:             postgresql://fte_user:fte_password@postgres:5432/fte_db
      KAFKA_BOOTSTRAP_SERVERS:  kafka:9092
      LOG_FORMAT:               json
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Daily reporter — runs once, exits; driven by cron or k8s CronJob ────────
  daily-reporter:
    build: .
    command: python -m production.workers.daily_report
    env_file:
      - .env
    environment:
      DATABASE_URL:             postgresql://fte_user:fte_password@postgres:5432/fte_db
      KAFKA_BOOTSTRAP_SERVERS:  kafka:9092
      LOG_FORMAT:               json
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"              # run-once; k8s CronJob handles scheduling

volumes:
  postgres_data:
